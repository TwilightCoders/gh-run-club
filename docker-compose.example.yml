# Copy to docker-compose.yml; put ACCESS_TOKEN in .env (gitignored).
services:
  runners:
    image: ghcr.io/twilightcoders/gh-run-club:latest   # or `build: .`
    container_name: gh-run-club
    restart: unless-stopped
    env_file: .env          # ACCESS_TOKEN=<fine-grained PAT, Administration:RW on the repos>
    environment:
      ORG: TwilightCoders
      REPOS: "vscode-alterminal claudepilot"   # +1 word per repo
      LABELS: "self-hosted,linux,x64,november"
      RUNNER_NAME_PREFIX: november
